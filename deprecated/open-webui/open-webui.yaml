---
apiVersion: v1
kind: Namespace
metadata:
  name: open-webui
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: open-webui-data
  namespace: open-webui
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  namespace: open-webui
  labels:
    app: open-webui
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: open-webui
  template:
    metadata:
      labels:
        app: open-webui
    spec:
      # Route Ollama and Claude through AgentGateway for monitoring and token tracking
      hostAliases:
      - ip: "10.107.96.13"  # agentgateway service ClusterIP
        hostnames:
        - "ollama.kubegit.com"
        - "claude.kubegit.com"
      containers:
      - name: open-webui
        image: ghcr.io/open-webui/open-webui:main
        ports:
        - containerPort: 8080
          name: http
        env:
        # OpenAI-compatible endpoints for full token tracking through AgentGateway
        # Multiple endpoints separated by semicolon
        - name: OPENAI_API_BASE_URLS
          value: "http://ollama.kubegit.com:8080/v1;http://claude.kubegit.com:8080/v1"
        - name: OPENAI_API_KEYS
          value: "sk-dummy;sk-dummy"  # Open WebUI requires values (auth handled by AgentGateway)
        # Disable Ollama native API (we're using OpenAI-compatible only)
        - name: ENABLE_OLLAMA_API
          value: "false"
        volumeMounts:
        - name: data
          mountPath: /app/backend/data
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: open-webui-data
---
apiVersion: v1
kind: Service
metadata:
  name: open-webui
  namespace: open-webui
  labels:
    app: open-webui
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: open-webui
