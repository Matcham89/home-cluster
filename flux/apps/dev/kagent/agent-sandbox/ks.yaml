---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app agent-sandbox
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  interval: 1h
  path: ./flux/apps/base/kagent/agent-sandbox
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  # No targetNamespace: the manifest creates and pins its own
  # `agent-sandbox-system` namespace; the CRD is cluster-scoped.
  timeout: 5m
  prune: true
  wait: true
