---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: substrate

spec:
  interval: 1m0s
  url: oci://ghcr.io/kagent-dev/substrate/helm/substrate
  ref:
    # renovate: datasource=github-releases depName=kagent-dev/substrate
    tag: "0.0.6"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: substrate
spec:
  interval: 1m0s
  releaseName: substrate
  chartRef:
    kind: OCIRepository
    name: substrate
  install:
    createNamespace: true
    remediation:
      retries: 3