---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: substrate

spec:
  interval: 1m0s
  url: oci://ghcr.io/kagent-dev/substrate/helm/substrate
  ref:
    # renovate: datasource=github-releases depName=kagent-dev/substrate
    tag: "0.0.6"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: substrate
spec:
  interval: 1m0s
  releaseName: substrate
  chartRef:
    kind: OCIRepository
    name: substrate
  install:
    createNamespace: true
    remediation:
      retries: 3
  values:
    auth:
      jwt:
        # Talos mints SA tokens with the API-server endpoint as the OIDC issuer,
        # not the stock in-cluster URL. ate-api rejects controller tokens unless
        # this matches the cluster's real issuer:
        #   kubectl get --raw /.well-known/openid-configuration | jq .issuer
        issuer: https://192.168.1.180:6443
  # Custom ate-controller image (fork of kagent-dev/substrate@0.0.6) that gives
  # the ateom worker pods a 1Gi memory-backed /dev/shm + explicit resources.
  # Upstream's 64Mi /dev/shm makes gVisor's runsc self-copy fail with ENOSPC
  # (fork/exec /proc/self/exe). Only the controller image differs; all other
  # substrate components stay on upstream 0.0.6.
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: ate-controller
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: ate-controller
              spec:
                template:
                  spec:
                    containers:
                      - name: ate-controller
                        image: docker.io/matcham89/atecontroller:0.0.6-shmfix@sha256:3da89954cda3e04e68de966064aca83fc576ef75bbf51932125613e2812e20a0
          - target:
              kind: Deployment
              name: ate-api-server-deployment
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: ate-api-server-deployment
              spec:
                template:
                  spec:
                    containers:
                      - name: ate-api-server
                        image: docker.io/matcham89/ateapi:0.0.6-workflow-timeout-20260615@sha256:464eec86614ea55e3fa964bf5b84f66360180efb7b2df9822a85a6fa5c17afc3
