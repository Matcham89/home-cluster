---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: substrate

spec:
  interval: 1m0s
  url: oci://ghcr.io/kagent-dev/substrate/helm/substrate
  ref:
    # renovate: datasource=github-releases depName=kagent-dev/substrate
    tag: "0.0.6"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: substrate
spec:
  interval: 1m0s
  releaseName: substrate
  chartRef:
    kind: OCIRepository
    name: substrate
  install:
    createNamespace: true
    remediation:
      retries: 3
  values:
    auth:
      jwt:
        # Talos mints SA tokens with the API-server endpoint as the OIDC issuer,
        # not the stock in-cluster URL. ate-api rejects controller tokens unless
        # this matches the cluster's real issuer:
        #   kubectl get --raw /.well-known/openid-configuration | jq .issuer
        issuer: https://192.168.1.180:6443
