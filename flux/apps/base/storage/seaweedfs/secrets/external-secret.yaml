---
# Generates the SeaweedFS S3 IAM config from the same Bitwarden credentials
# used by loki's s3-credentials secret (monitoring namespace).
# The IAM JSON is consumed by filer.s3.existingConfigSecret in the HelmRelease.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: seaweedfs-s3-config
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretsmanager
    kind: ClusterSecretStore
  target:
    name: seaweedfs-s3-config
    template:
      data:
        seaweedfs_s3_config: |
          {"identities":[{"name":"loki","credentials":[{"accessKey":"{{ .access_key }}","secretKey":"{{ .secret_key }}"}],"actions":["Admin","Read","Write","ReadAcp","WriteAcp","List","Tagging"]}]}
  data:
  - secretKey: access_key
    remoteRef:
      key: "bb4663e0-bd91-4051-8ce2-b3ca0011e145"
  - secretKey: secret_key
    remoteRef:
      key: "64cca494-0538-4cfb-a13e-b3cb01751b3e"
