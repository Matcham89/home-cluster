---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: seaweedfs-ingress-authz
  namespace: storage
spec:
  action: ALLOW
  rules:
    # Loki S3 access
    - from:
        - source:
            namespaces: ["monitoring"]
      to:
        - operation:
            ports: ["8333"]
    # Prometheus metrics scraping
    - from:
        - source:
            namespaces: ["monitoring"]
      to:
        - operation:
            ports: ["9324", "9327", "9328", "9329"]
    # Internal SeaweedFS component communication
    - from:
        - source:
            namespaces: ["storage"]
