---
# Builds the `openshell-db` Secret (key: uri) that the OpenShell gateway reads
# via server.externalDbSecret. Reuses the existing Postgres superuser Bitwarden
# item (same one authentik/n8n use) and templates it into a connection URI,
# so no new secret entry is needed. Points at the CNPG cluster in `databases`.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openshell-db
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretsmanager
    kind: ClusterSecretStore
  target:
    name: openshell-db
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      data:
        uri: "postgresql://{{ .username }}:{{ .password | urlquery }}@postgres-cluster-rw.databases.svc.cluster.local:5432/openshell?sslmode=require"
  dataFrom:
    - extract:
        key: "c45c2bb1-e39f-4728-a885-b3ae00f78240"
