---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: openshell

spec:
  interval: 1m0s
  url: oci://ghcr.io/nvidia/openshell/helm-chart
  ref:
    # renovate: datasource=github-releases depName=nvidia/openshell
    tag: 0.0.57
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openshell

spec:
  interval: 1m0s
  releaseName: openshell
  chartRef:
    kind: OCIRepository
    name: openshell
  install:
    strategy:
      name: RetryOnFailure
    createNamespace: true
    timeout: 10m
  upgrade:
    strategy:
      name: RetryOnFailure
    cleanupOnFail: true
    timeout: 10m
  values:
    # Homelab/dev: run the gateway in plaintext gRPC with no client auth, because
    # kagent v0.9.5's controller cannot present a client cert (mTLS) or obtain a
    # gateway JWT. In-cluster traffic only. Revisit for a secure (mTLS+JWT) setup
    # once kagent exposes client-cert config.
    server:
      disableTls: true
      auth:
        allowUnauthenticatedUsers: true
      tls:
        clientCaSecretName: ""
      # Use the CNPG Postgres cluster (databases ns) instead of the default
      # SQLite-on-Longhorn, which locked under fsync latency. Secret built by
      # the openshell-db ExternalSecret (key: uri).
      externalDbSecret: openshell-db
