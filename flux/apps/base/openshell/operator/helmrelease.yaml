---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: openshell

spec:
  interval: 1m0s
  url: oci://ghcr.io/nvidia/openshell/helm-chart
  ref:
    # renovate: datasource=github-releases depName=nvidia/openshell
    tag: 0.0.57
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openshell

spec:
  interval: 1m0s
  releaseName: openshell
  chartRef:
    kind: OCIRepository
    name: openshell
  install:
    strategy:
      name: RetryOnFailure
    createNamespace: true
    timeout: 10m
  upgrade:
    strategy:
      name: RetryOnFailure
    cleanupOnFail: true
    timeout: 10m
  values: {}
