---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana-route
  namespace: ingress
spec:
  parentRefs:
    - name: ingress-gateway
      namespace: ingress
      sectionName: http
  hostnames:
    - "grafana.kubegit.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Forwarded-Port
                value: "443"
              - name: X-Forwarded-Proto
                value: "https"
      timeouts:
        request: 30s
        backendRequest: 30s
      backendRefs:
        - name: kube-prometheus-stack-grafana
          namespace: monitoring
          port: 80
