---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: ingress-gateway
  namespace: ingress
  annotations:
    # Request the same IP previously used by istio-gateway so Cloudflare tunnel routes are unchanged
    metallb.universe.tf/loadBalancerIPs: "192.168.1.201"
spec:
  gatewayClassName: agentgateway
  infrastructure:
    annotations:
      metallb.universe.tf/loadBalancerIPs: "192.168.1.201"
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      hostname: "*.kubegit.com"
      allowedRoutes:
        namespaces:
          from: All
