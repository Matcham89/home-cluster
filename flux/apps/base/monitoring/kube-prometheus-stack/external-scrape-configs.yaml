---
# Additional scrape configs for external services that don't expose ServiceMonitors.
# PostgreSQL and SeaweedFS are now in-cluster and scraped via PodMonitor/ServiceMonitor.
apiVersion: v1
kind: Secret
metadata:
  name: additional-scrape-configs
  namespace: monitoring
type: Opaque
stringData:
  prometheus-additional.yaml: |
    # Scrape Qdrant metrics
    - job_name: 'qdrant-external'
      static_configs:
        - targets: ['qdrant-external.external-services.svc.cluster.local:6333']
          labels:
            service: 'qdrant'
