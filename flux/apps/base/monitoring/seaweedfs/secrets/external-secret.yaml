---
# SeaweedFS S3 auth config — builds the s3 identity JSON from separate Bitwarden entries.
# The same UUIDs used by the s3-credentials secret (Loki S3 access).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: seaweedfs-s3-config
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretsmanager
    kind: ClusterSecretStore
  target:
    name: seaweedfs-s3-config
    template:
      data:
        seaweedfs_s3_config.json: |
          {
            "identities": [
              {
                "name": "default",
                "credentials": [
                  {
                    "accessKey": "{{ .accessKey }}",
                    "secretKey": "{{ .secretKey }}"
                  }
                ],
                "actions": ["Admin", "Read", "Write"]
              }
            ]
          }
  data:
    - secretKey: accessKey
      remoteRef:
        key: "bb4663e0-bd91-4051-8ce2-b3ca0011e145"
    - secretKey: secretKey
      remoteRef:
        key: "64cca494-0538-4cfb-a13e-b3cb01751b3e"
