---
apiVersion: v1
kind: Namespace
metadata:
  name: external-services
  labels:
    name: external-services
---
# Qdrant External Service
apiVersion: v1
kind: Service
metadata:
  name: qdrant-external
  namespace: external-services
spec:
  ports:
  - name: http
    port: 6333
    targetPort: 6333
    protocol: TCP
  - name: grpc
    port: 6334
    targetPort: 6334
    protocol: TCP
  clusterIP: None
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: qdrant-external
  namespace: external-services
  labels:
    kubernetes.io/service-name: qdrant-external
addressType: IPv4
endpoints:
- addresses:
  - "192.168.1.100"
ports:
- name: http
  port: 6333
  protocol: TCP
- name: grpc
  port: 6334
  protocol: TCP
---
# Ollama External Service
apiVersion: v1
kind: Service
metadata:
  name: ollama-external
  namespace: external-services
spec:
  ports:
  - port: 11434
    targetPort: 11434
    protocol: TCP
  clusterIP: None
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: ollama-external
  namespace: external-services
  labels:
    kubernetes.io/service-name: ollama-external
addressType: IPv4
endpoints:
- addresses:
  - "192.168.1.100"
ports:
- port: 11434
  protocol: TCP
