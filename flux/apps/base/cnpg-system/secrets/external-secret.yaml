---
# Superuser credentials for the CloudNativePG postgres cluster.
# Bitwarden entry must have 'username' and 'password' fields.
# This is the same shared postgres credentials entry used by n8n and authentik.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-superuser
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretsmanager
    kind: ClusterSecretStore
  target:
    name: postgres-superuser
  dataFrom:
    - extract:
        key: "c45c2bb1-e39f-4728-a885-b3ae00f78240"
