---
# yaml-language-server: $schema=https://github.com/fluxcd-community/flux2-schemas/raw/main/helmrepository-source-v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: cloudnative-pg
spec:
  interval: 10m
  url: https://cloudnative-pg.github.io/charts
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudnative-pg
spec:
  interval: 10m
  chart:
    spec:
      chart: cloudnative-pg
      version: 0.23.0
      sourceRef:
        kind: HelmRepository
        name: cloudnative-pg
  install:
    strategy:
      name: RetryOnFailure
    createNamespace: true
    timeout: 10m
    remediation:
      retries: 3
  upgrade:
    strategy:
      name: RetryOnFailure
    cleanupOnFail: true
    timeout: 10m
    remediation:
      retries: 3
      strategy: rollback
  values:
    # Exclude webhook port from ztunnel interception in Istio ambient mode.
    # The kube-apiserver connects directly to port 9443 and cannot go through
    # the mesh tunnel — ambient mode causes EOF on webhook calls without this.
    podAnnotations:
      traffic.sidecar.istio.io/excludeInboundPorts: "9443"
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 512Mi
