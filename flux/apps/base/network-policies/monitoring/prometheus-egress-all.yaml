---
# Allow Prometheus to scrape metrics from all namespaces
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: prometheus-egress-all
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  policyTypes:
  - Egress
  egress:
  # Allow egress to all namespaces for scraping
  - to:
    - namespaceSelector: {}
  # Allow DNS
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - port: 53
      protocol: TCP
    - port: 53
      protocol: UDP
  # Allow API server access for service discovery.
  # Siderolabs flannel evaluates policies before kube-proxy DNAT, so we must allow:
  #   - the kubernetes ClusterIP (10.96.0.1:443) — pre-DNAT destination
  #   - the actual control plane node IPs (:6443) — post-DNAT destination (belt-and-braces)
  - to:
    - ipBlock:
        cidr: 10.96.0.1/32
    ports:
    - port: 443
      protocol: TCP
  - to:
    - ipBlock:
        cidr: 192.168.1.181/32
    - ipBlock:
        cidr: 192.168.1.182/32
    - ipBlock:
        cidr: 192.168.1.183/32
    ports:
    - port: 6443
      protocol: TCP
