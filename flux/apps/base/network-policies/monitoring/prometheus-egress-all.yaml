---
# Allow Prometheus to scrape metrics from all namespaces
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: prometheus-egress-all
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  policyTypes:
  - Egress
  egress:
  # Allow egress to all namespaces for scraping
  - to:
    - namespaceSelector: {}
  # Allow DNS
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - port: 53
      protocol: TCP
    - port: 53
      protocol: UDP
  # Allow API server access for service discovery.
  # Talos control plane pods use hostNetwork (node IPs), so podSelector can't target them.
  - to:
    - ipBlock:
        cidr: 192.168.1.181/32
    - ipBlock:
        cidr: 192.168.1.182/32
    - ipBlock:
        cidr: 192.168.1.183/32
    ports:
    - port: 6443
      protocol: TCP
