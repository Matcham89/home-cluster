---
# Allow Loki to reach SeaweedFS S3 via the external-services namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: loki-egress-seaweedfs
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: loki
  policyTypes:
  - Egress
  egress:
  # SeaweedFS is an external service (EndpointSlice in external-services). After DNAT the
  # destination is the bare node IP, so namespaceSelector cannot match it — use ipBlock.
  - to:
    - ipBlock:
        cidr: 192.168.1.100/32
    ports:
    - protocol: TCP
      port: 8333
