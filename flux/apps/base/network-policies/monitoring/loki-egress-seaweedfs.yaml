---
# Allow Loki to reach SeaweedFS S3 via the external-services namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: loki-egress-seaweedfs
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: loki
  policyTypes:
  - Egress
  egress:
  # SeaweedFS S3 runs in-cluster in the storage namespace.
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: storage
    ports:
    - protocol: TCP
      port: 8333
