---
# Allow all traffic between pods within the monitoring namespace.
# Covers: Grafanaâ†’Prometheus, Grafanaâ†’Loki, Grafanaâ†’Tempo, Promtailâ†’Loki,
# Loki read/write/backend internal comms, Tempoâ†’Prometheus remote write.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector: {}
  egress:
  - to:
    - podSelector: {}
