---
# Allow all traffic between pods within the storage namespace.
# Covers: SeaweedFS master ↔ volume ↔ filer gRPC communication.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector: {}
  egress:
  - to:
    - podSelector: {}
