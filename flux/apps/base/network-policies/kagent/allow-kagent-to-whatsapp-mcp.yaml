---
# Allow kagent controller and MCP clients to reach whatsapp-mcp on port 3000
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kagent-to-whatsapp-mcp
spec:
  podSelector:
    matchLabels:
      app: whatsapp-mcp
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kagent
      ports:
        - port: 3000
          protocol: TCP
