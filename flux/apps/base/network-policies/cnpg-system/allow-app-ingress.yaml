---
# Allow application namespaces to connect to the CloudNativePG postgres cluster
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-app-ingress
spec:
  podSelector:
    matchLabels:
      cnpg.io/cluster: postgres
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: n8n
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: authentik
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: rundeck
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: monitoring
    ports:
    - protocol: TCP
      port: 5432
