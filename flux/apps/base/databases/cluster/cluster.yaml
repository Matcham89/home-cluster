---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-cluster
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:17

  enableSuperuserAccess: true
  superuserSecret:
    name: postgres-superuser

  storage:
    size: 10Gi
    storageClass: longhorn

  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "1GB"
      effective_cache_size: "3GB"
      maintenance_work_mem: "256MB"
      wal_buffers: "16MB"
      checkpoint_completion_target: "0.9"
      min_wal_size: "1GB"
      max_wal_size: "4GB"
      default_statistics_target: "100"
      random_page_cost: "1.1"
      effective_io_concurrency: "200"
      work_mem: "5MB"
      TimeZone: "America/Edmonton"

  monitoring:
    enablePodMonitor: true

  # Dedicated, non-superuser login roles per app. CNPG continuously reconciles
  # each role's password from its basic-auth secret (labelled cnpg.io/reload),
  # so the role password can never drift out of sync. Each role owns its own
  # database (ownership set out-of-band via ALTER DATABASE / REASSIGN OWNED).
  managed:
    roles:
      - name: authentik
        ensure: present
        login: true
        superuser: false
        passwordSecret:
          name: authentik-db-role
      - name: n8n
        ensure: present
        login: true
        superuser: false
        passwordSecret:
          name: n8n-db-role

  bootstrap:
    initdb:
      database: homelab
      owner: postgres
      postInitSQL:
        - CREATE DATABASE "home-cluster"
        - CREATE DATABASE n8n
