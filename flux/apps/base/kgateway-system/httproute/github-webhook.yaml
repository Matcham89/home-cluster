---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: github-webhook
  namespace: kgateway-system
spec:
  parentRefs:
    - name: agentgateway
      namespace: kgateway-system
      sectionName: http
    - name: agentgateway
      namespace: kgateway-system
      sectionName: https
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /webhook/github
      backendRefs:
        - name: github-webhook-backend
          namespace: kgateway-system
          group: agentgateway.dev
          kind: AgentgatewayBackend
