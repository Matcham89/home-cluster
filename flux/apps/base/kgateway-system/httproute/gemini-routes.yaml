---
# ============================================================================
# GEMINI HTTP ROUTES
# ============================================================================
# Each route connects a gateway to its corresponding backend.
# ============================================================================

# ============================================================================
# ROUTE 1: Gemini 2.5 Flash
# ============================================================================
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gemini-flash-route
  namespace: kgateway-system
  labels:
    app: gemini-flash
    model: gemini-2-5-flash
    provider: gemini
spec:
  parentRefs:
    - name: gemini-flash-gateway
      namespace: kgateway-system
      sectionName: http
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1/chat
      backendRefs:
        - name: gemini-flash-backend
          namespace: kgateway-system
          group: agentgateway.dev
          kind: AgentgatewayBackend
    - matches:
        - path:
            type: PathPrefix
            value: /v1/completions
      backendRefs:
        - name: gemini-flash-backend
          namespace: kgateway-system
          group: agentgateway.dev
          kind: AgentgatewayBackend
    - matches:
        - path:
            type: Exact
            value: /v1/models
      backendRefs:
        - name: gemini-flash-backend
          namespace: kgateway-system
          group: agentgateway.dev
          kind: AgentgatewayBackend
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: gemini-flash-backend
          namespace: kgateway-system
          group: agentgateway.dev
          kind: AgentgatewayBackend

