---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whatsapp-mcp
  namespace: kagent
  labels:
    app: whatsapp-mcp
    app.kubernetes.io/name: whatsapp-mcp
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: whatsapp-mcp
  template:
    metadata:
      labels:
        app: whatsapp-mcp
        app.kubernetes.io/name: whatsapp-mcp
    spec:
      containers:
        - name: whatsapp-mcp
          image: matcham89/whatsapp-mcp:latest
          ports:
            - containerPort: 3000
              name: http
          volumeMounts:
            - name: auth-data
              mountPath: /data/auth
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      restartPolicy: Always
      volumes:
        - name: auth-data
          persistentVolumeClaim:
            claimName: whatsapp-auth-pvc
