---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: kagent

spec:
  interval: 1m0s
  url: oci://ghcr.io/kagent-dev/kagent/helm/kagent
  ref:
    # renovate: datasource=github-releases depName=kagent-dev/kagent
    tag: 0.9.9
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kagent

spec:
  interval: 1m0s
  releaseName: kagent
  chartRef:
    kind: OCIRepository
    name: kagent
  # WorkerPool CRD (ate.dev/v1alpha1) is required to render the
  # substrateWorkerPool template — gate the helm upgrade on substrate-crds.
  dependsOn:
    - name: substrate-crds
      namespace: ate-system
  install:
    strategy:
      name: RetryOnFailure
    createNamespace: true
    timeout: 10m
  upgrade:
    strategy:
      name: RetryOnFailure
    cleanupOnFail: true
    timeout: 10m
  # Note: Kubernetes 1.34+ has stricter label validation that rejects '+' in labels
  # Fixed by enabling DisableChartDigestTracking feature gate in helm-controller
  # See: https://github.com/fluxcd/flux2/issues/4910
  values:
    default: anthropic
    revisionHistoryLimit: 2
    substrateWorkerPool:
      create: true
      replicas: 2
      # ateom-gvisor is a SUBSTRATE component — tag must match the substrate
      # chart version (0.0.6), not the kagent version. v0.9.7 does not exist.
      ateomImage: ghcr.io/kagent-dev/substrate/ateom-gvisor:v0.0.6

    # Override default resource limits to prevent CPU throttling
    # CPU limits removed - CPU is compressible, requests provide sufficient scheduling protection
    resources:
      limits:
        memory: 2Gi
      requests:
        cpu: 100m
        memory: 256Mi

    securityContext:
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: false
      runAsNonRoot: true
      runAsUser: 1000
    podSecurityContext:
      fsGroup: 1000
    controller:
      resources:
        limits:
          memory: 512Mi
        requests:
          cpu: 100m
          memory: 128Mi
      service:
        appProtocol: kgateway.dev/mcp
      substrate:
        enabled: true
        ateApiEndpoint: "dns:///api.ate-system.svc:443"
        ateApiInsecure: true
        # runsc pinned to nightly 2026-06-02 (amd64). The chart default 2026-05-19
        # FAILS to RESTORE the node.js OpenClaw actor on amd64 gVisor `systrap` with
        # "inconsistent private memory files on restore" (works on arm64 — see
        # docs/substrate-openclaw-talos.md). A runsc nightly sweep (2026-06-16) found
        # the gVisor C/R fix landed between 05-26 (still fails) and 06-02 (RESTORES),
        # and 06-02 checkpoint still works (it breaks at 06-13). So 06-02 is the
        # sweet spot for amd64 OpenClaw checkpoint+restore on Talos.
        # arm64 left on the chart default (no arm64 Talos nodes; 05-19 restores on arm64).
        runscAMD64URL: "gs://gvisor/releases/nightly/2026-06-02/x86_64/runsc"
        runscAMD64SHA256: "efd12935f6654c91a1389710eb8dfa4d12b6b9be00db87526dc2eb584ad00119"

    agents:
      k8s-agent:
        enabled: true
      kgateway-agent:
        enabled: true
      istio-agent:
        enabled: false
      promql-agent:
        enabled: true
      observability-agent:
        enabled: true
      argo-rollouts-agent:
        enabled: false
      helm-agent:
        enabled: true
      cilium-policy-agent:
        enabled: false
      cilium-manager-agent:
        enabled: false
      cilium-debug-agent:
        enabled: false

    # ==============================================================================
    # OBSERVABILITY
    # ==============================================================================

    otel:
      tracing:
        enabled: true
        exporter:
          otlp:
            endpoint: http://otel-collector-collector-headless.monitoring.svc.cluster.local:4317
            timeout: 15
            insecure: true
      logging:
        enabled: true
        exporter:
          otlp:
            endpoint: http://otel-collector-collector-headless.monitoring.svc.cluster.local:4317
            timeout: 15
            insecure: true
