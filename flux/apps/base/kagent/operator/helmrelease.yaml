---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: kagent

spec:
  interval: 1m0s
  url: oci://ghcr.io/kagent-dev/kagent/helm/kagent
  ref:
    # renovate: datasource=github-releases depName=kagent-dev/kagent
    tag: 0.9.7
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kagent

spec:
  interval: 1m0s
  releaseName: kagent
  chartRef:
    kind: OCIRepository
    name: kagent
  # WorkerPool CRD (ate.dev/v1alpha1) is required to render the
  # substrateWorkerPool template — gate the helm upgrade on substrate-crds.
  dependsOn:
    - name: substrate-crds
      namespace: ate-system
  install:
    strategy:
      name: RetryOnFailure
    createNamespace: true
    timeout: 10m
  upgrade:
    strategy:
      name: RetryOnFailure
    cleanupOnFail: true
    timeout: 10m
  # Note: Kubernetes 1.34+ has stricter label validation that rejects '+' in labels
  # Fixed by enabling DisableChartDigestTracking feature gate in helm-controller
  # See: https://github.com/fluxcd/flux2/issues/4910
  values:
    default: anthropic
    revisionHistoryLimit: 2
    substrateWorkerPool:
      create: true
      replicas: 2
      # Experimental substrate worker with rootfs overlays disabled to avoid
      # inconsistent per-container private filestores during gVisor restore.
      ateomImage: docker.io/matcham89/ateom-gvisor:0.0.6-host-network-20260616@sha256:08d8b37827033f5ad917efcf9384666269c02da82468deffd23ad7500f329843

    # Override default resource limits to prevent CPU throttling
    # CPU limits removed - CPU is compressible, requests provide sufficient scheduling protection
    resources:
      limits:
        memory: 2Gi
      requests:
        cpu: 100m
        memory: 256Mi

    securityContext:
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: false
      runAsNonRoot: true
      runAsUser: 1000
    podSecurityContext:
      fsGroup: 1000
    controller:
      env:
        - name: SUBSTRATE_CALL_TIMEOUT
          value: 5m
      image:
        registry: docker.io
        repository: matcham89/kagent-controller
        tag: substrate-resume-retry-20260615@sha256:c83e1394fbc2c68aee2ad1b4e4dba39893055300ab2a37b56100790748710fe0
        pullPolicy: IfNotPresent
      resources:
        limits:
          memory: 512Mi
        requests:
          cpu: 100m
          memory: 128Mi
      service:
        appProtocol: kgateway.dev/mcp
      substrate:
        enabled: true
        ateApiEndpoint: "dns:///api.ate-system.svc:443"
        ateApiInsecure: true
        # runsc stays on the chart default (nightly 2026-05-19) that substrate's
        # checkpoint/restore code is built against. Newer runsc (2026-06-13) broke
        # checkpoint outright. The custom worker image above tests a fix for the
        # node.js restore failure without changing the pinned runsc version.

    agents:
      k8s-agent:
        enabled: true
      kgateway-agent:
        enabled: true
      istio-agent:
        enabled: false
      promql-agent:
        enabled: true
      observability-agent:
        enabled: true
      argo-rollouts-agent:
        enabled: false
      helm-agent:
        enabled: true
      cilium-policy-agent:
        enabled: false
      cilium-manager-agent:
        enabled: false
      cilium-debug-agent:
        enabled: false

    # ==============================================================================
    # OBSERVABILITY
    # ==============================================================================

    otel:
      tracing:
        enabled: true
        exporter:
          otlp:
            endpoint: http://otel-collector-collector-headless.monitoring.svc.cluster.local:4317
            timeout: 15
            insecure: true
      logging:
        enabled: true
        exporter:
          otlp:
            endpoint: http://otel-collector-collector-headless.monitoring.svc.cluster.local:4317
            timeout: 15
            insecure: true
