---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: kagent

spec:
  interval: 1m0s
  url: oci://ghcr.io/kagent-dev/kagent/helm/kagent
  ref:
    # renovate: datasource=github-releases depName=kagent-dev/kagent
    tag: 0.9.6
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kagent

spec:
  interval: 1m0s
  releaseName: kagent
  chartRef:
    kind: OCIRepository
    name: kagent
  install:
    strategy:
      name: RetryOnFailure
    createNamespace: true
    timeout: 10m
  upgrade:
    strategy:
      name: RetryOnFailure
    cleanupOnFail: true
    timeout: 10m
  # Note: Kubernetes 1.34+ has stricter label validation that rejects '+' in labels
  # Fixed by enabling DisableChartDigestTracking feature gate in helm-controller
  # See: https://github.com/fluxcd/flux2/issues/4910
  values:
    default: anthropic
    revisionHistoryLimit: 2

    # Override default resource limits to prevent CPU throttling
    # CPU limits removed - CPU is compressible, requests provide sufficient scheduling protection
    resources:
      limits:
        memory: 2Gi
      requests:
        cpu: 100m
        memory: 256Mi

    securityContext:
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: false
      runAsNonRoot: true
      runAsUser: 1000
    podSecurityContext:
      fsGroup: 1000
    controller:
      resources:
        limits:
          memory: 512Mi
        requests:
          cpu: 100m
          memory: 128Mi
      service:
        appProtocol: kgateway.dev/mcp
      # Point the controller at the OpenShell gateway so the AgentHarness
      # reconciler is enabled (otherwise: "AgentHarness controller disabled:
      # --openshell-gateway-url not set"). OpenShell exposes gRPC on :8080.
      # NB: the env var is OPENSHELL_GATEWAY_URL (maps to --openshell-gateway-url);
      # the chart's OPENSHELL_GRPC_ADDR example comment is stale and has no effect.
      env:
        # Documented gRPC dns:/// target form (kagent.dev AgentHarness docs).
        - name: OPENSHELL_GATEWAY_URL
          value: "dns:///openshell.openshell.svc:8080"
        # Gateway runs plaintext gRPC (see openshell HelmRelease) — dial without TLS.
        - name: OPENSHELL_INSECURE
          value: "true"

    agents:
      k8s-agent:
        enabled: true
      kgateway-agent:
        enabled: true
      istio-agent:
        enabled: false
      promql-agent:
        enabled: true
      observability-agent:
        enabled: true
      argo-rollouts-agent:
        enabled: false
      helm-agent:
        enabled: true
      cilium-policy-agent:
        enabled: false
      cilium-manager-agent:
        enabled: false
      cilium-debug-agent:
        enabled: false

    # ==============================================================================
    # OBSERVABILITY
    # ==============================================================================

    otel:
      tracing:
        enabled: true
        exporter:
          otlp:
            endpoint: http://otel-collector-collector-headless.monitoring.svc.cluster.local:4317
            timeout: 15
            insecure: true
      logging:
        enabled: true
        exporter:
          otlp:
            endpoint: http://otel-collector-collector-headless.monitoring.svc.cluster.local:4317
            timeout: 15
            insecure: true
