---
# OpenClaw agent harness on the substrate runtime (gVisor checkpoint/restore).
# Backed by the kagent-default worker pool; the gateway token and model config
# come from the kagent-secrets and kagent-providers Kustomizations respectively.
# See docs/substrate-openclaw-open-items.md for the deployment saga.
apiVersion: kagent.dev/v1alpha2
kind: AgentHarness
metadata:
  name: openclaw
  namespace: kagent
spec:
  backend: openclaw
  modelConfigRef: default-model-config
  runtime: substrate
  substrate:
    # Custom sandbox image (derivative of nemoclaw/sandbox-base) that bridges the
    # kagent agent broker (controller /mcp) into the gateway config at startup.
    # Source: images/openclaw-sandbox-mcp/. Pinned to the amd64 manifest digest.
    workloadImage: docker.io/matcham89/openclaw-sandbox-mcp@sha256:c9950b4eac9c372b09e2504562961c7b2802aa3c42f342382003ae014f539d6c
    # Golden snapshots are keyed to this prefix and REUSED across spec updates, so a
    # workloadImage change alone won't rebuild them. Bump this suffix whenever the
    # image changes to force a fresh golden snapshot (which boots the new image →
    # runs the MCP-injecting shim → captures the broker config).
    snapshotsConfig:
      location: gs://ate-snapshots/kagent/openclaw-mcp-v1
    gatewayTokenSecretRef:
      name: harness-gateway-token
    workerPoolRef:
      name: kagent-default
