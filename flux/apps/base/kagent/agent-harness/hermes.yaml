---
apiVersion: kagent.dev/v1alpha2
kind: AgentHarness
metadata:
  name: hermes-sandbox
  namespace: kagent
spec:
  backend: hermes
  modelConfigRef: default-model-config
  description: "hermes agent"
  # Egress-deny-by-default sandbox; the Hermes actor needs its model API to boot.
  network:
    allowedDomains:
      - api.openai.com
