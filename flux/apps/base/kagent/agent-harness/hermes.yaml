---
apiVersion: kagent.dev/v1alpha2
kind: AgentHarness
metadata:
  name: hermes-sandbox
  namespace: kagent
spec:
  substrate:
    workerPoolRef:
      name: hermes-worker-pool
  backend: hermes
  modelConfigRef: default-model-config
  description: "hermes agent"
  # Egress-deny-by-default sandbox; the Hermes actor needs its model API to boot.
  network:
    allowedDomains:
      - api.openai.com
      - slack.com
      - api.slack.com
      - wss-primary.slack.com
      - wss-backup.slack.com
  channels:
    - name: platform
      type: slack
      slack:
        botToken:
          valueFrom:
            type: Secret
            name: slack-tokens
            key: bot-token
        appToken:
          valueFrom:
            type: Secret
            name: slack-tokens
            key: app-token
        hermes:
          allowedUserIDs:
            - U01234567
            - U89ABCDEF
          homeChannel: C0123456789
          homeChannelName: platform-alerts
