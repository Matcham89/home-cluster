---
apiVersion: kagent.dev/v1alpha2
kind: AgentHarness
metadata:
  name: deepagents-sandbox
  namespace: kagent
spec:
  backend: deepagents
  modelConfigRef: default-model-config
  description: "deepagents (dcode) agent"
  # Egress-deny-by-default sandbox; the dcode actor needs its model API to boot.
  # Routes through the OpenShell inference gateway (inference.local); allow the
  # upstream the gateway proxies to (matches the hermes harness).
  network:
    allowedDomains:
      - api.openai.com
