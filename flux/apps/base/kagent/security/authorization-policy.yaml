---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: kagent-ingress-authz
  namespace: kagent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: kagent
  action: ALLOW
  rules:
    - from:
        - source:
            namespaces: ["istio-system"]
    - from:
        - source:
            namespaces: ["kagent"]
