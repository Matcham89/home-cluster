---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: kagent-crds
spec:
  interval: 1m0s
  url: oci://ghcr.io/kagent-dev/kagent/helm/kagent-crds
  ref:
    # renovate: datasource=github-releases depName=kagent-dev/kagent
    tag: 0.9.6
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kagent-crds
spec:
  interval: 1m0s
  releaseName: kagent-crds
  chartRef:
    kind: OCIRepository
    name: kagent-crds
  install:
    createNamespace: true
    remediation:
      retries: 3
  # The pinned chart (0.9.6) predates the deepagents AgentHarness backend, so patch the
  # backend enum onto the rendered CRD. Helm owns the CRD, so there is no Flux/Helm fight.
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: CustomResourceDefinition
              name: agentharnesses.kagent.dev
            patch: |
              - op: add
                path: /spec/versions/0/schema/openAPIV3Schema/properties/spec/properties/backend/enum/-
                value: deepagents
              - op: add
                path: /spec/versions/0/schema/openAPIV3Schema/properties/status/properties/backendRef/properties/backend/enum/-
                value: deepagents
