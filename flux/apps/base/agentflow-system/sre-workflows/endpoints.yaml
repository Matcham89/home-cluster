# AgentEndpoints routing into kagent's A2A controller.
# protocol: a2a tells the agentflow runner to wrap requests in the Google A2A
# JSON-RPC 2.0 message/send envelope and extract output from result artifacts.
#
# Network policy: allow-agentflow-to-controller (in network-policies/kagent/) must be
# applied first so agentflow-system pods can reach kagent-controller on port 8083.
---
apiVersion: agentflow.io/v1alpha1
kind: AgentEndpoint
metadata:
  name: k8s-inspector
  namespace: agentflow-system
spec:
  type: http
  http:
    method: POST
    protocol: a2a
    url: http://kagent-controller.kagent.svc.cluster.local:8083/api/a2a/kagent/k8s-inspector-agent/
    timeoutSeconds: 120
---
apiVersion: agentflow.io/v1alpha1
kind: AgentEndpoint
metadata:
  name: k8s-events
  namespace: agentflow-system
spec:
