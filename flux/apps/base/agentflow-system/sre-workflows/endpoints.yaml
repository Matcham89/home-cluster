kind: AgentEndpoint
metadata:
  name: flux-health
  namespace: agentflow-system
spec:
  type: http
  http:
    method: POST
    protocol: a2a
    # flux-health-agent has internal retry loops (up to 3×60s waits) — use a generous timeout
    url: http://kagent-controller.kagent.svc.cluster.local:8083/api/a2a/kagent/flux-health-agent/
    timeoutSeconds: 300
